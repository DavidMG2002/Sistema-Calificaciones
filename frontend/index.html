<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Calificaciones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Georgia", "Times New Roman", serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .menu-container {
            background: #ffffff;
            padding: 50px 40px;
            border: 2px solid #000000;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #000000;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 3px solid #000000;
            padding-bottom: 15px;
        }

        .menu-options {
            margin: 30px 0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px 20px;
            margin: 18px 0;
            background: #000000;
            color: #ffffff;
            text-decoration: none;
            border: 2px solid #000000;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateX(5px);
        }

        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #000000;
            font-size: 14px;
            color: #000000;
            font-style: italic;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>Sistema de Calificaciones</h1>
        
        <div class="menu-options">
            <a href="pages/alumnos.html" class="btn">Alumnos</a>
            <a href="pages/profesores.html" class="btn">Profesores</a>
            <a href="pages/examenes.html" class="btn">Exámenes</a>
            <a href="pages/grupos.html" class="btn">Grupos</a>
        </div>

        <footer>Panel Principal Académico</footer>
    </div>

</body>
</html>
